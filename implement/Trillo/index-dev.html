<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/main-dev.css" />
    <link rel="shortcut icon" type="image/png" href="./img/favicon.png" />

    <title>trillo &mdash; Your all-in-one booking app</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <img src="./img/logo.png" alt="Trillo logo" class="logo" />

        <form action="#" class="search">
          <input class="search__input" placeholder="Search hotels" />
          <button class="search__button">
            <svg class="search__icon">
              <use xlink:href="./img/sprite.svg#icon-magnifying-glass"></use>
            </svg>
          </button>
        </form>

        <nav class="user-nav">
          <a href="#" class="user-nav__icon-box">
            <svg class="user-nav__icon">
              <use xlink:href="./img/sprite.svg#icon-bookmark"></use>
            </svg>
            <span class="user-nav__notification">7</span>
          </a>
          <a href="#" class="user-nav__icon-box">
            <svg class="user-nav__icon">
              <use xlink:href="./img/sprite.svg#icon-chat"></use>
              <span class="user-nav__notification">13</span>
            </svg>
          </a>
          <a href="#" class="user-nav__user">
            <picture>
              <img
                src="./img/user.jpg"
                alt="User photo"
                class="user-nav__user-photo"
              />
            </picture>

            <span class="user-nav__user-name">Artem</span>
          </a>
        </nav>
      </header>
      <div class="content">
        <nav class="sidebar">
          <ul class="side-nav">
            <li class="side-nav__item side-nav__item--active">
              <a href="#" class="side-nav__link">
                <svg class="side-nav__icon">
                  <use xlink:href="./img/sprite.svg#icon-home"></use>
                </svg>
                <span>Hotel</span>
              </a>
            </li>
            <li class="side-nav__item">
              <a href="#" class="side-nav__link">
                <svg class="side-nav__icon">
                  <use
                    xlink:href="./img/sprite.svg#icon-aircraft-take-off"
                  ></use>
                </svg>
                <span>Flight</span>
              </a>
            </li>
            <li class="side-nav__item">
              <a href="#" class="side-nav__link">
                <svg class="side-nav__icon">
                  <use xlink:href="./img/sprite.svg#icon-key"></use>
                </svg>
                <span>Car rental</span>
              </a>
            </li>
            <li class="side-nav__item">
              <a href="#" class="side-nav__link">
                <svg class="side-nav__icon">
                  <use xlink:href="./img/sprite.svg#icon-map"></use>
                </svg>
                <span>Tours</span>
              </a>
            </li>
          </ul>

          <div class="legal">
            &copy; Trillo project from
            <a
              href="https://www.udemy.com/course/advanced-css-and-sass/"
              class="legal__link"
              >Udemy CSS and SASS
            </a>
            course. Made by
            <a href="https://github.com/miezaruexpr " class="legal__link"
              >Artem Usatyi</a
            >. Designed by course author
            <a
              href="https://www.udemy.com/user/jonasschmedtmann/?kw=jonas+schmedtmann&src=sac"
              class="legal__link"
            >
              Jonas Schmedtmann</a
            >.
          </div>
        </nav>
        <main class="hotel-view">Hotel view</main>
      </div>
    </div>
  </body>
</html>
